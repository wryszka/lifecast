# LifeCast jobs — all serverless (notebook tasks with no cluster spec run on
# serverless compute), all tagged project=lifecast.
resources:
  jobs:

    # Phase 0 — run once after deploy. Generates the synthetic Bricksurance
    # Life term book (clean feed + separate bad-feed-day file) and the mock
    # "Prophet" model point extract (the before-state anchor).
    lifecast_synthetic_foundation:
      name: lifecast_synthetic_foundation
      description: "Phase 0: synthetic Bricksurance Life policy book (clean overnight feed + bad-feed-day demo file) and the mock downstream model point extract."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: policy_book
          environment_key: default
          notebook_task:
            notebook_path: ../00_foundation/00_synthetic_policy_book.py
        - task_key: prophet_extract
          depends_on:
            - task_key: policy_book
          environment_key: default
          notebook_task:
            notebook_path: ../00_foundation/01_prophet_extract_mock.py
        - task_key: assumption_master
          environment_key: default
          notebook_task:
            notebook_path: ../02_assumption_governance/00_assumption_master.py
        - task_key: external_scenarios
          environment_key: default
          notebook_task:
            notebook_path: ../04_scenario_management/00_external_scenarios_mock.py
        - task_key: run_health_genie
          environment_key: default
          notebook_task:
            notebook_path: ../01_model_point_pipeline/04_create_run_health_genie.py

    # Phase 1 — the governed overnight run. Pipeline refresh -> quality gate
    # -> export. A bad extract fails the gate and STOPS the run before the
    # downstream model point file is burned. Prophet stays downstream, unchanged.
    lifecast_overnight_run:
      name: lifecast_overnight_run
      description: "Phase 1: governed overnight run — refresh model point pipeline, data-quality gate (fails loudly on a bad feed), export model point file + validation extract."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: job_run_id
          default: "{{job.run_id}}"
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: refresh_model_points
          pipeline_task:
            pipeline_id: ${resources.pipelines.lifecast_model_point_pipeline.id}
        - task_key: quality_gate
          depends_on:
            - task_key: refresh_model_points
          environment_key: default
          notebook_task:
            notebook_path: ../01_model_point_pipeline/01_quality_gate.py
        - task_key: export_model_point_file
          depends_on:
            - task_key: quality_gate
          environment_key: default
          notebook_task:
            notebook_path: ../01_model_point_pipeline/02_export_model_point_file.py

    # Phase 2 — the maker step. Runs exactly the SQL the Excel template submits
    # via DATABRICKS.SQL: drafts a new basis from the approved one (smoker qx
    # loading), registers it, submits it for approval. Ends PENDING_APPROVAL.
    lifecast_assumption_entry:
      name: lifecast_assumption_entry
      description: "Phase 2: assumption entry (Excel round-trip, headless) — drafts a shocked basis from the approved one and submits it for approval."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: basis_name
          default: "Best Estimate — smoker loading review"
        - name: smoker_loading_pct
          default: "10"
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: assumption_entry
          environment_key: default
          notebook_task:
            notebook_path: ../02_assumption_governance/01_excel_entry_roundtrip.py

    # Phase 2 — the checker step. approve: new basis live, old one SUPERSEDED;
    # reject: current basis stays in force. Every action lands in asm_approval_log.
    lifecast_assumption_approval:
      name: lifecast_assumption_approval
      description: "Phase 2: assumption approval — approve or reject a PENDING_APPROVAL basis, with full audit trail."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: assumption_set_id
          default: latest_pending
        - name: decision
          default: approve
        - name: note
          default: "Reviewed against experience analysis."
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: assumption_approval
          environment_key: default
          notebook_task:
            notebook_path: ../02_assumption_governance/02_assumption_approval.py

    # Phase 3 — the quarterly results run: ingest the liability model's CSV
    # dumps into the governed results layer, refresh the CFO export, keep the
    # dashboard and Genie space in place (both tasks idempotent).
    lifecast_results_run:
      name: lifecast_results_run
      description: "Phase 3: results run — refresh the governed results layer, run the BEL analytics + run-audit trail, export the board pack (Excel+CSV, with rate-risk and audit sheets), publish the LifeCast — BEL Movement dashboard, ensure the LifeCast — Results Genie space."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: refresh_results
          pipeline_task:
            pipeline_id: ${resources.pipelines.lifecast_results_pipeline.id}
        - task_key: bel_analytics
          depends_on:
            - task_key: refresh_results
          environment_key: default
          notebook_task:
            notebook_path: ../03_results_and_genie/05_bel_analytics.py
        - task_key: run_audit
          depends_on:
            - task_key: refresh_results
          environment_key: default
          notebook_task:
            notebook_path: ../03_results_and_genie/06_run_audit.py
        - task_key: cfo_export
          depends_on:
            - task_key: bel_analytics
            - task_key: run_audit
          environment_key: default
          notebook_task:
            notebook_path: ../03_results_and_genie/02_cfo_export.py
        - task_key: publish_dashboard
          depends_on:
            - task_key: bel_analytics
            - task_key: run_audit
          environment_key: default
          notebook_task:
            notebook_path: ../03_results_and_genie/03_create_dashboard.py
        - task_key: genie_space
          depends_on:
            - task_key: run_audit
          environment_key: default
          notebook_task:
            notebook_path: ../03_results_and_genie/04_create_genie_space.py

    # The mock actuarial engine, orchestrated: picks up the exported model point
    # file, values the term book (base + ±100bp), dumps results CSVs — behaving
    # exactly like the real engine does from the outside.
    lifecast_engine_run:
      name: lifecast_engine_run
      description: "The engine run (mock): consumes the exported MPF + approved basis + curve, values the term book per model point with ±100bp sensitivities, dumps estate results CSVs for the results run to ingest."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: job_run_id
          default: "{{job.run_id}}"
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: engine_run
          environment_key: default
          notebook_task:
            notebook_path: ../03_results_and_genie/00_engine_run.py

    # The whole quarter close as one orchestrated workflow: feed -> gate -> MPF,
    # then the engine, then the governed results layer + BI + analytics.
    lifecast_quarter_close:
      name: lifecast_quarter_close
      description: "Quarter close, end to end: overnight run (feed -> gate -> model point file) -> engine run -> results run (ingest, exports, dashboard, Genie, analytics). One workflow, fully governed."
      tags:
        project: lifecast
      tasks:
        - task_key: overnight
          run_job_task:
            job_id: ${resources.jobs.lifecast_overnight_run.id}
        - task_key: engine
          depends_on:
            - task_key: overnight
          run_job_task:
            job_id: ${resources.jobs.lifecast_engine_run.id}
        - task_key: results
          depends_on:
            - task_key: engine
          run_job_task:
            job_id: ${resources.jobs.lifecast_results_run.id}

    # Phase 4 (a) — consume: validate, version and activate an external ESG
    # scenario delivery. Zero friction for licensed firms.
    lifecast_scenario_ingest:
      name: lifecast_scenario_ingest
      description: "Phase 4: scenario ingest (consume pattern) — validate the vendor delivery, version it in UC, activate it; broken deliveries fail the gate and are never activated."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: scenario_ingest
          environment_key: default
          notebook_task:
            notebook_path: ../04_scenario_management/01_scenario_ingest.py

    # Phase 4 (b) — illustrate: EIOPA RFR curve -> QuantLib HW1F + BS paths,
    # versioned in UC, calibration tracked in MLflow. AVAILABLE, never auto-active.
    lifecast_esg_illustrative:
      name: lifecast_esg_illustrative
      description: "Phase 4: illustrative scenario generator — EIOPA RFR ingest, then QuantLib Hull-White 1F + Black-Scholes calibrated to the curve; params + martingale diagnostics in MLflow."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: n_scenarios
          default: "1000"
        - name: hw_a
          default: "0.03"
        - name: hw_sigma
          default: "0.009"
        - name: equity_vol
          default: "0.18"
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
        # ML work runs on the LifeCast ML environment (v5 + QuantLib/MLflow);
        # Databricks-provided AI base env IDs aren't supported on this workspace yet.
        - environment_key: ml
          spec:
            base_environment: /Workspace/Shared/lifecast/environments/lifecast_ml.yml
      tasks:
        - task_key: rfr_curve
          environment_key: default
          notebook_task:
            notebook_path: ../04_scenario_management/02_eiopa_rfr.py
        - task_key: quantlib_generator
          depends_on:
            - task_key: rfr_curve
          environment_key: ml
          notebook_task:
            notebook_path: ../04_scenario_management/03_quantlib_hull_white.py

    # Phase 5 — the projection migration POC (workshop scaffold): legacy
    # baseline -> Python projection (MLflow + UC model) -> per-MP tie-out gate.
    lifecast_projection_run:
      name: lifecast_projection_run
      description: "Phase 5: projection migration POC — legacy engine baseline, Python term projection on governed inputs (MLflow-tracked, UC-registered), per-model-point side-by-side validation with a tolerance gate."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
        - environment_key: ml
          spec:
            base_environment: /Workspace/Shared/lifecast/environments/lifecast_ml.yml
      tasks:
        - task_key: legacy_baseline
          environment_key: default
          notebook_task:
            notebook_path: ../05_projection_migration/00_prophet_baseline_mock.py
        - task_key: term_projection
          depends_on:
            - task_key: legacy_baseline
          environment_key: ml
          notebook_task:
            notebook_path: ../05_projection_migration/01_term_projection.py
        - task_key: validation
          depends_on:
            - task_key: term_projection
          environment_key: ml
          notebook_task:
            notebook_path: ../05_projection_migration/02_projection_validation.py

    # Phase 6 — stochastic valuation fan-out: the term book across every path
    # of a governed scenario set via mapInPandas. The explainer notebooks in
    # 06_stochastic_boundaries/ are interactive-only (discuss, don't sell).
    lifecast_stochastic_run:
      name: lifecast_stochastic_run
      description: "Phase 6: stochastic fan-out — per-scenario BEL across the governed scenario set (mapInPandas), distribution + curve-reconciliation metric to MLflow."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: scenario_source
          default: active
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: stochastic_fan_out
          environment_key: default
          notebook_task:
            notebook_path: ../06_stochastic_boundaries/00_stochastic_fan_out.py

    # Use case 07, parts 1+2 — the model factory: build the projection as a UC
    # model (freeze basis+curve into the version, v1 loop -> v2 vectorised,
    # compare gate -> promote), then run @champion from Unity across the grid
    # (grid_size is the scale knob).
    lifecast_model_factory:
      name: lifecast_model_factory
      description: "Use case 07 (parts 1+2): build the term projection as a UC-registered model (versioned, basis+curve frozen in), compare/promote via the penny-parity gate, then run @champion from Unity across a compute grid — grid_size is a parameter."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: grid_size
          default: "10"
        - name: replication
          default: "100"
      environments:
        - environment_key: ml
          spec:
            base_environment: /Workspace/Shared/lifecast/environments/lifecast_ml.yml
        # Packaging the torch variant needs torch importable, not a GPU.
        - environment_key: torch
          spec:
            base_environment: /Workspace/Shared/lifecast/environments/lifecast_torch.yml
      tasks:
        - task_key: build_model
          environment_key: ml
          notebook_task:
            notebook_path: ../07_model_factory/00_build_model.py
        - task_key: run_grid
          depends_on:
            - task_key: build_model
          environment_key: ml
          notebook_task:
            notebook_path: ../07_model_factory/01_run_grid.py
        - task_key: gpu_variant
          depends_on:
            - task_key: build_model
          environment_key: torch
          notebook_task:
            notebook_path: ../07_model_factory/02_gpu_variant.py

    # Use case 07, part 3 — run @gpu from Unity on serverless GPU compute (A10).
    # Separate job so the CPU factory never depends on GPU availability. NOTE:
    # the GPU pool can LOAD from the registry but not publish to it (no egress
    # to artifact storage) — packaging happens in the factory's gpu_variant task.
    lifecast_model_factory_gpu:
      name: lifecast_model_factory_gpu
      description: "Use case 07 (part 3): load the @gpu version of lifecast_engine_model from Unity on serverless GPU compute (A10) — penny-parity gate vs @champion, then seriatim-scale CPU-vs-GPU timing (gld_gpu_timings)."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: replication
          default: "100"
      environments:
        # The Databricks AI base env (databricks_ai_v5) isn't enabled on this
        # workspace (custom yaml paths only) — the GPU standard environment
        # ships CUDA torch, so the plain env works.
        - environment_key: gpu
          spec:
            environment_version: "4"
      tasks:
        - task_key: run_gpu
          environment_key: gpu
          compute:
            hardware_accelerator: GPU_1xA10
          notebook_task:
            notebook_path: ../07_model_factory/03_run_gpu.py

    # Reset the demo to a clean, presentable state. Run this if anything looks
    # broken: restores the feed (removes any injected bad files + full refresh),
    # then runs the whole quarter close (overnight -> engine -> results).
    lifecast_reset_demo:
      name: lifecast_reset_demo
      description: "Reset demo: restore the feed (remove injected bad files, full refresh), then run the full quarter close. Leaves everything GREEN and current — safe to run any time."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: action
          default: restore
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: restore_feed
          environment_key: default
          notebook_task:
            notebook_path: ../01_model_point_pipeline/03_bad_feed_day.py
        - task_key: quarter_close
          depends_on:
            - task_key: restore_feed
          run_job_task:
            job_id: ${resources.jobs.lifecast_quarter_close.id}

    # Demo lever — inject the bad feed day (gate goes RED, run stops), or
    # restore (remove the bad file + full-refresh the pipeline, gate GREEN).
    lifecast_bad_feed_day:
      name: lifecast_bad_feed_day
      description: "Demo lever: action=inject drops the bad feed into the landing path; action=restore removes it and full-refreshes the pipeline."
      tags:
        project: lifecast
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: action
          default: inject
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      tasks:
        - task_key: bad_feed_day
          environment_key: default
          notebook_task:
            notebook_path: ../01_model_point_pipeline/03_bad_feed_day.py
