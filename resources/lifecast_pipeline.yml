# Phase 1 — the governed model point pipeline (Lakeflow Declarative Pipelines).
# Serverless, publishes into ${var.catalog}.lifecast with brz_/slv_/gld_ prefixes.
# UC lineage volume -> bronze -> silver -> gold comes for free.
resources:
  pipelines:
    lifecast_model_point_pipeline:
      name: lifecast_model_point_pipeline
      serverless: true
      catalog: ${var.catalog}
      schema: lifecast
      libraries:
        - file:
            path: ../01_model_point_pipeline/00_model_point_pipeline.py
      configuration:
        catalog: ${var.catalog}
        volume_root: /Volumes/${var.catalog}/lifecast/lifecast_files
        project: lifecast

    # Phase 3 — the governed results layer: the liability model's quarterly CSV
    # dumps land in Delta once; Genie + the dashboard query it.
    lifecast_results_pipeline:
      name: lifecast_results_pipeline
      serverless: true
      catalog: ${var.catalog}
      schema: lifecast
      libraries:
        - file:
            path: ../03_results_and_genie/01_results_pipeline.py
      configuration:
        catalog: ${var.catalog}
        volume_root: /Volumes/${var.catalog}/lifecast/lifecast_files
        project: lifecast
