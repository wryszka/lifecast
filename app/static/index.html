<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LifeCast Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Bricksurance design tokens — reused from claims/reinsurance workbench */
:root{--bg:#f6f7f9;--card:#fff;--ink:#0f172a;--line:#e6e8ec;--muted:#64748b;
      --v:#2563eb;--v7:#1d4ed8;--v50:#eff6ff;--v100:#dbeafe;
      --green:#067647;--green-bg:#ecfdf3;--amber:#b54708;--amber-bg:#fffaeb}
*{box-sizing:border-box;margin:0;padding:0}
.layout{display:flex;min-height:100vh}
.side{width:248px;background:#0b1220;color:#fff;display:flex;flex-direction:column;flex-shrink:0;
      position:sticky;top:0;height:100vh}
.brand{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;gap:11px;align-items:center}
.brand .dot{width:30px;height:30px;border-radius:9px;background:var(--v);display:flex;align-items:center;
            justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.brand b{font-size:14.5px;display:block;line-height:1.2}
.brand span{font-size:10.5px;color:#aeb6c6;letter-spacing:.08em;text-transform:uppercase}
.nav{flex:1;padding:12px 10px;overflow:auto}
.nav .sec{font-size:9.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#5b6477;
          padding:14px 12px 5px}
.nav a{display:flex;gap:10px;align-items:center;padding:9px 12px;border-radius:9px;color:#aeb6c6;
       text-decoration:none;font-size:13.5px;cursor:pointer;font-weight:500}
.nav a.on{background:rgba(37,99,235,.22);color:#fff;font-weight:600;box-shadow:inset 0 0 0 1px rgba(37,99,235,.4)}
.nav a:hover{color:#fff}
.nav a .ext{margin-left:auto;font-size:10px;color:#5b6477}
.sidefoot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:10.5px;color:#5b6477;line-height:1.5}
.main{flex:1;min-width:0;background:var(--bg)}
/* process map */
.pmap{display:grid;grid-template-columns:1fr 36px 1.05fr 36px 1fr;gap:14px;margin-top:26px;align-items:stretch}
.pcol{display:flex;flex-direction:column;gap:12px}
.collbl{font-size:10px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.pblock{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px;
        display:block;color:var(--ink);transition:border-color .12s, box-shadow .12s;flex:1}
a.pblock:hover{border-color:var(--v);box-shadow:0 2px 10px rgba(37,99,235,.08)}
.pblock.c-blue{background:#f4f8ff;border-color:#d7e4fb}
.pblock.c-green{background:#f3fcf6;border-color:#cdebd8}
.pblock.c-blue .go,.pblock.c-green .go{color:var(--v)}
.pblock h3{font-size:14.5px;font-weight:700;margin-bottom:4px}
.pblock p{font-size:12px;color:var(--muted)}
.pblock .go{margin-top:8px;font-size:11.5px;font-weight:700;color:var(--v)}
.pblock.primary{border-color:var(--v);box-shadow:inset 0 0 0 1px var(--v)}
.pmaparr{display:flex;align-items:center;justify-content:center;color:var(--v);font-size:22px;font-weight:800}
.engineblk{background:#fffdf5;border:2px dashed #ecd9a8;border-radius:14px;padding:22px 18px;
           display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1}
.engineblk h3{font-size:16px;font-weight:800}
.engineblk p{font-size:12px;color:var(--muted);margin-top:6px;max-width:240px}
.engineblk .tag{font-size:9.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
                margin-bottom:8px}
.beside{margin-top:12px}
.beside .collbl{margin-bottom:8px}
.beside a{display:block;background:var(--card);border:1px solid var(--line);border-radius:10px;
          padding:10px 13px;font-size:12px;color:var(--ink);margin-top:8px}
.beside a:hover{border-color:var(--v)}
.beside a b{display:block;font-size:12.5px}
.beside a span{color:var(--muted);font-size:11.5px}
@media(max-width:960px){.pmap{grid-template-columns:1fr}.pmaparr{transform:rotate(90deg);min-height:34px}
  .side{display:none}}
body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
     font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--v);text-decoration:none}
.wrap{max-width:1040px;margin:0 auto;padding:28px 24px 64px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--v)}
h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:4px 0 6px}
h2{font-size:19px;font-weight:700;letter-spacing:-.01em}
.sub{color:var(--muted);max-width:680px}
.disclaimer{margin-top:10px;font-size:12px;color:var(--muted);background:var(--card);
            border:1px solid var(--line);border-radius:8px;padding:8px 12px;display:inline-block}
.crumb{font-size:12px;color:var(--muted);margin-bottom:14px}
.crumb a{color:var(--muted);font-weight:600}
.crumb a:hover{color:var(--v)}
.grid{display:grid;gap:14px;margin-top:22px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.persona{cursor:pointer;transition:border-color .12s, box-shadow .12s}
.persona:hover{border-color:var(--v);box-shadow:0 2px 10px rgba(37,99,235,.08)}
.persona h2{margin-bottom:6px}
.persona p{color:var(--muted);font-size:13px}
.persona .go{margin-top:12px;font-size:12px;font-weight:700;color:var(--v)}
.tile{padding:14px 16px}
.tile .lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.tile .val{font-size:16px;font-weight:800;margin-top:4px;word-break:break-all}
.tile .det{font-size:12px;color:var(--muted);margin-top:2px}
.val.GREEN,.val.TIES_OUT{color:var(--green)}
.val.RED,.val.DRIFT{color:#b42318}
.qitem{display:flex;align-items:center;justify-content:space-between;cursor:pointer;
       transition:border-color .12s}
.qitem:hover{border-color:var(--v)}
.qitem h2{font-size:15.5px;font-weight:600}
.qitem .arr{color:var(--v);font-weight:800;margin-left:16px}
.section{margin-top:18px}
.section .eyebrow{color:var(--muted)}
.section .body{margin-top:6px}
.proves{font-size:16px;font-weight:600;margin-top:6px}
.where li{margin:5px 0 5px 18px}
.gobtns{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.btn{display:inline-block;background:var(--v);color:#fff;font-weight:600;font-size:13px;
     padding:8px 14px;border-radius:8px}
.btn:hover{background:var(--v7)}
.tt{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.tt .t{border-radius:10px;padding:12px 14px;font-size:13px}
.tt .today{background:var(--amber-bg);border:1px solid #fedf89}
.tt .tomorrow{background:var(--green-bg);border:1px solid #abefc6}
.tt .tag{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:4px}
.tt .today .tag{color:var(--amber)} .tt .tomorrow .tag{color:var(--green)}
.foot{margin-top:36px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:14px}
/* flow page */
.flow-h2{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:2px 0 8px}
.story{color:var(--ink);max-width:760px;font-size:15px}
.lanetag{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-top:22px}
.lanetag.now{color:var(--amber)} .lanetag.here{color:var(--v)}
.mapgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:8px}
.nowcard{background:var(--amber-bg);border:1px solid #fedf89;border-radius:12px;padding:12px 14px;
         font-size:12px;color:#7a5300;display:flex;flex-direction:column}
.nowcard .nlbl{font-size:10px;font-weight:800;color:#d6a946;margin-bottom:4px}
.maparrows{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:4px 0}
.maparrows div{text-align:center;color:var(--muted);font-size:15px}
.step{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;
      display:flex;flex-direction:column;min-width:0}
.step .num{width:26px;height:26px;border-radius:8px;background:var(--v50);color:var(--v);
           font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
.step h3{font-size:15px;font-weight:700;margin:10px 0 6px}
.step p{font-size:12.5px;color:var(--muted);flex:1}
.step .lnk{display:block;font-size:12px;font-weight:600;margin-top:6px}
/* top nav (tabs) */
.topnav{display:flex;gap:18px;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:0}
.topnav a{font-size:13px;font-weight:600;color:var(--muted);padding:6px 2px 10px;border-bottom:2px solid transparent}
.topnav a.on{color:var(--v);border-bottom-color:var(--v)}
.topnav a:hover{color:var(--v)}
/* governance */
.gtable{width:100%;border-collapse:collapse;margin-top:10px;background:var(--card);
        border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:12.5px}
.gtable th{background:var(--bg);text-align:left;font-size:10.5px;font-weight:800;letter-spacing:.08em;
           text-transform:uppercase;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--line)}
.gtable td{padding:8px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.gtable tr:last-child td{border-bottom:none}
.gtable .num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;font-size:10.5px;font-weight:800;border-radius:999px;padding:2px 10px}
.badge.GREEN,.badge.TIES_OUT{background:var(--green-bg);color:var(--green)}
.badge.RED,.badge.DRIFT{background:#fef3f2;color:#b42318}
.rulebar{display:flex;align-items:center;gap:10px;margin:6px 0}
.rulebar .rname{flex:0 0 180px;font-size:12.5px;font-family:ui-monospace,SFMono-Regular,monospace}
.rulebar .bar{height:14px;background:var(--v100);border-radius:4px}
.rulebar .cnt{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.scopenote{margin-top:18px;font-size:12.5px;color:var(--muted);background:var(--card);
           border:1px dashed var(--line);border-radius:10px;padding:10px 14px}
/* three tabs */
.subtabs{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.subtab{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 16px;
        font-size:13px;font-weight:600;color:var(--muted)}
.subtab.on{background:var(--v);border-color:var(--v);color:#fff}
.subtab:hover{border-color:var(--v);color:var(--v)} .subtab.on:hover{color:#fff}
.usefor{margin-top:8px;font-size:13px;color:var(--muted);font-style:italic}
.lead{margin-top:16px;font-size:16px;font-weight:600;max-width:780px}
.swaprow{display:grid;grid-template-columns:34px 1fr 44px 1fr;gap:12px;align-items:stretch;margin-top:12px}
.swaprow .sn{width:30px;height:30px;border-radius:9px;background:var(--v50);color:var(--v);font-weight:800;
             font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:14px}
.swaprow .arr{display:flex;align-items:center;justify-content:center;color:var(--v);font-size:19px;font-weight:800}
.swapold{background:var(--amber-bg);border:1px solid #fedf89;border-radius:12px;padding:13px 15px;
         font-size:13px;color:#7a5300;display:flex;flex-direction:column;justify-content:center}
.swapold .sl{font-size:10px;font-weight:800;letter-spacing:.1em;color:#d6a946;margin-bottom:3px}
.swapnew{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:13px}
.swapnew .sl{font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--v);margin-bottom:3px}
.swapnew .lnk{display:inline-block;font-size:12px;font-weight:600;margin:5px 14px 0 0}
.handoff{display:grid;grid-template-columns:1fr 44px 1.4fr;gap:0;margin-top:22px;align-items:stretch}
.handoff .ours{background:var(--v50);border:1px solid var(--v100);border-radius:12px 0 0 12px;
               padding:16px 18px;font-weight:700}
.handoff .ours .sl{font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--v);display:block;margin-bottom:4px}
.handoff .boundary{border-left:3px dashed var(--v);display:flex;align-items:center;justify-content:center;
                   position:relative}
.handoff .boundary span{position:absolute;top:-9px;left:8px;font-size:9px;font-weight:800;letter-spacing:.1em;
                        color:var(--v);background:var(--bg);padding:0 4px;white-space:nowrap}
.handoff .theirs{background:var(--bg);border:1px dashed var(--line);border-radius:0 12px 12px 0;
                 padding:16px 18px;color:var(--muted)}
.handoff .theirs .sl{font-size:10px;font-weight:800;letter-spacing:.1em;display:block;margin-bottom:4px}
.handoffnote{margin-top:10px;font-size:13px;max-width:760px}
.nextlink{display:inline-block;margin-top:10px;font-weight:700;font-size:13px}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-top:16px}
.mcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.mcard h3{font-size:14px;font-weight:700;margin-bottom:8px}
.mcard .mline{font-size:13px;margin:6px 0}
.mcard .mline b.GREEN,.mcard .mline b.SUCCESS{color:var(--green)} .mcard .mline b.RED,.mcard .mline b.FAILED{color:#b42318}
.mbtns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.btn2{display:inline-block;background:var(--card);border:1px solid var(--v);color:var(--v);font-weight:600;
      font-size:12.5px;padding:7px 12px;border-radius:8px;cursor:pointer}
.btn2:hover{background:var(--v50)}
.askbox{margin-top:10px}
.askbox textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;
                 font-size:13px;resize:vertical;min-height:44px}
.askq{display:block;font-size:12px;font-weight:600;color:var(--v);cursor:pointer;margin-top:5px}
.askans{margin-top:12px;font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.askans pre{font-size:11px;overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:6px;padding:8px;margin-top:8px}
/* placeholders + state tags */
.ntag{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
      border-radius:999px;padding:2px 8px;margin-left:8px;vertical-align:2px}
.ntag.live{background:var(--green-bg);color:var(--green)}
.ntag.next{background:var(--v50);color:var(--v)}
.ntag.planned,.ntag.coming,.ntag.roadmap,.ntag.placeholder{background:var(--amber-bg);color:var(--amber)}
.ntag.specced{background:var(--v50);color:var(--v)}
.nav a.ph{opacity:.62}
.nav a .mini{margin-left:auto;font-size:8.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
             color:#8a93a6;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:1px 7px}
.nav a .mini.live{color:#7ee2a8;border-color:rgba(126,226,168,.35)}
.sidefoot a{color:#8a93a6;font-weight:600}
.sidefoot a:hover{color:#fff}
.phcard{background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:14px 16px;opacity:.85}
.phcard .tlbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.phcard p{font-size:13px;margin-top:4px;color:var(--ink)}
.phgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:14px}
.agentrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
          border-radius:10px;padding:10px 14px;margin-top:8px;font-size:12.5px}
/* destination tab */
.ghosts{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.ghost{border:2px dashed #ecd9a8;background:#fffdf5;border-radius:10px;padding:8px 14px;color:var(--muted);
       font-size:12px;opacity:.9;text-align:center}
.ghost b{display:block;text-decoration:line-through;font-size:12.5px;color:var(--muted)}
.ghost span{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}
.feeds{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.feeds a{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 13px;
         font-size:12px;color:var(--ink);font-weight:600}
.feeds a:hover{border-color:var(--v);color:var(--v)}
.gains{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:14px}
.gain{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.gain b{display:block;font-size:13.5px;margin-bottom:4px}
.gain p{font-size:12.5px;color:var(--muted)}
.pmap3{display:grid;grid-template-columns:1fr 36px 1.1fr 36px 1fr;gap:14px;margin-top:24px;align-items:stretch}
/* runbook + terms */
.beat{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:12px}
.beat summary{cursor:pointer;padding:14px 18px;font-weight:700;font-size:14px;color:var(--v);list-style:none}
.beat summary::before{content:'▸ '} .beat[open] summary::before{content:'▾ '}
.beat .b-steps{padding:0 18px 14px}
.b-step{display:grid;grid-template-columns:26px 1fr;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
.b-step .bn{width:24px;height:24px;border-radius:7px;background:var(--v50);color:var(--v);font-weight:800;
            font-size:12px;display:flex;align-items:center;justify-content:center}
.b-step .bdo{font-weight:600;font-size:13px}
.b-step .bex{font-size:12.5px;color:var(--muted);margin-top:2px}
.b-step .bsay{font-size:12.5px;margin-top:4px;color:var(--ink)}
.b-step .bsay::before{content:'Say: ';font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--v)}
.termrow{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-top:10px}
.termrow b{display:block;margin-bottom:2px}
.termrow span{font-size:13px;color:var(--muted)}
/* landing tiles */
.tilegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;margin-top:22px}
.uctile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;
        cursor:pointer;transition:border-color .12s, box-shadow .12s;display:block;color:var(--ink)}
.uctile:hover{border-color:var(--v);box-shadow:0 2px 10px rgba(37,99,235,.08)}
.uctile .tnum{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--v)}
.uctile h2{font-size:16px;margin:6px 0 4px}
.uctile p{font-size:12.5px;color:var(--muted)}
.uctile .go{margin-top:10px;font-size:12px;font-weight:700;color:var(--v)}
.uctile.ext .go{color:var(--muted)}
.lever{margin-top:18px;background:var(--v50);border:1px solid var(--v100);border-radius:12px;
       padding:14px 18px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between}
.lever .tag{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--v);display:block;margin-bottom:4px}
.lever p{font-size:13px;max-width:560px}
.lever .gobtns{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 14px;font-size:12px}
.chip b{font-weight:700}
.chip.GREEN b,.chip.TIES_OUT b{color:var(--green)} .chip.RED b,.chip.DRIFT b{color:#b42318}
.personarow{margin-top:26px}
.personarow .plinks{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.plink{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 16px;
       font-weight:600;font-size:13px;color:var(--ink)}
.plink:hover{border-color:var(--v);color:var(--v)}
@media(max-width:820px){.mapgrid{grid-template-columns:1fr}.maparrows{display:none}}
@media(max-width:640px){.tt{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root" style="padding:40px;font-family:Inter,sans-serif">Loading…</div>
<script>
let DATA=null, STATUS=null, GOV=null;
const root=document.getElementById('root');
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function shell(active, html){
  const t = DATA ? DATA.tiles : [];
  const flowItem = (idx, key, label) => {
    const tile = t[idx]; if(!tile) return '';
    if(tile.flow) return `<a href="#/flow/${tile.flow}" class="${active===key?'on':''}">${label}</a>`;
    return `<a href="${tile.url}" target="_blank">${label}<span class="ext">↗</span></a>`;
  };
  root.innerHTML = `<div class="layout">
  <aside class="side">
    <div class="brand"><div class="dot">L</div>
      <div><b>LifeCast</b><span>Bricksurance Life</span></div></div>
    <nav class="nav">
      <a href="#/" class="${active==='map'?'on':''}">Overview</a>
      <div class="sec">Inputs</div>
      <a href="#/flow/model-point-feed" class="${active==='mp'?'on':''}">Model points<span class="mini live">live</span></a>
      <a href="#/block/assumptions" class="ph ${active==='assumptions'?'on':''}">Assumptions<span class="mini">next</span></a>
      <a href="#/block/scenarios" class="ph ${active==='scenarios'?'on':''}">Scenarios (ESG)<span class="mini">planned</span></a>
      <div class="sec">Modelling & results</div>
      <a href="#/block/modelling" class="ph ${active==='modelling'?'on':''}">Modelling<span class="mini">planned</span></a>
      <a href="#/block/results" class="ph ${active==='results'?'on':''}">Results<span class="mini">planned</span></a>
      <div class="sec">Cross-cutting</div>
      <a href="#/governance" class="${active==='gov'?'on':''}">Governance</a>
      <a href="#/block/roadmap" class="ph ${active==='roadmap'?'on':''}">Roadmap<span class="mini">roadmap</span></a>
    </nav>
    <div class="sidefoot" style="padding-bottom:8px">
      <a href="#/terms">Terms</a> · <a href="#/personas">Personas</a> · <a href="#/poc">POC plan</a></div>
    <div class="sidefoot" style="border-top:none;padding-top:4px">About this demo — Bricksurance Life
    is fictional; every figure is synthetic and illustrative. No client data, no actuarial methodology.</div>
  </aside>
  <div class="main"><div class="wrap">${html}</div></div></div>`;
}

function header(crumbs){
  let c = crumbs ? `<div class="crumb">${crumbs}</div>` : '';
  return `${c}<div class="eyebrow">Bricksurance Life · presenter's cockpit</div>
  <h1>LifeCast Cockpit</h1>
  <p class="sub">Pick the persona you're presenting to, then the question that just came up.
  Every card says what it proves, where it lives, how it's built and controlled — and routes you
  straight to the real asset. Thin by design: links and read-only status only.</p>
  <div class="disclaimer">About this demo — Bricksurance Life is fictional; every figure is synthetic
  and illustrative. No client data, no pricing logic, no actuarial methodology.</div>`;
}

function landing(maptab){
  maptab = maptab || 'now';
  const t = DATA.tiles;
  const pills = `<div class="subtabs">
    <a class="subtab ${maptab==='now'?'on':''}" href="#/">Around the engine</a>
    <a class="subtab ${maptab==='dest'?'on':''}" href="#/destination">The destination</a></div>`;
  if(maptab==='dest'){
    shell('map', `
    <div class="eyebrow">Bricksurance Life · presenter's cockpit</div>
    <h1>Actuarial liability modelling, end to end</h1>
    ${pills}
    <p class="lead">This is where it lands. Same journey — policy data to a valued liability — but
    the two boxes that only ever existed to dodge old limits are gone. Every policy projected
    directly, end to end on one platform.</p>

    <div class="pmap3">
      <div class="pcol"><div class="collbl">Inputs — same governed feeds</div>
        <a class="pblock c-blue" href="#/flow/model-point-feed"><h3>Policy data</h3>
          <p>Every policy, landed and gated — no summarising, no grouping. The same governed
          ingestion you saw, minus the compression.</p>
          <div class="go">The data journey →</div></a>
        <a class="pblock c-blue" href="#/block/assumptions"><h3>Assumptions — the basis</h3>
          <p>The same versioned, approved basis — unchanged in the destination.</p>
          <div class="go">Open the block →</div></a>
        <a class="pblock c-blue" href="#/block/scenarios"><h3>Economic scenarios</h3>
          <p>The same governed scenario sets — unchanged in the destination.</p>
          <div class="go">Open the block →</div></a></div>
      <div class="pmaparr">→</div>
      <div class="pcol"><div class="collbl">Projection</div>
        <a class="pblock primary c-blue" href="#/block/modelling"><h3>Projection — native, in parallel</h3>
          <p>Every policy on its own terms (seriatim), in Python on the platform. Runtime is a
          sizing choice, not a wall.</p>
          <div class="go">Open the block →</div></a>
        <div class="ghosts">
          <div class="ghost"><b>Grouping step</b><span>gone</span></div>
          <div class="ghost"><b>Licensed engine</b><span>gone</span></div></div></div>
      <div class="pmaparr">→</div>
      <div class="pcol"><div class="collbl">Results</div>
        <a class="pblock c-green" href="#/block/results"><h3>Results & analytics</h3>
          <p>One results layer — dashboard, Genie, the export. "Prove what fed this number"
          answered end to end.</p>
          <div class="go">Open the block →</div></a>
        <a class="pblock c-green" href="#/governance"><h3>Governance & audit</h3>
          <p>One lineage, fully reproducible — data, assumptions, scenarios, projection, results.</p>
          <div class="go">Open the record →</div></a></div>
    </div>

    <p class="sub" style="margin-top:16px;max-width:820px">The grouping step disappears — you
    project every policy on its own terms, not a few thousand representative cells. And the
    licensed engine disappears — the projection runs natively in Python on the platform, fed by
    the same governed assumptions and scenarios. What's left is the essential flow: policy data
    → projection → results, in one place.</p>

    <div class="section" style="margin-top:22px"><span class="eyebrow">What you gain</span></div>
    <div class="gains">
      <div class="gain"><b>Simpler</b><p>Two whole pieces gone — the grouping step and the licensed
        engine. Fewer moving parts to build, run, govern and explain.</p></div>
      <div class="gain"><b>More accurate</b><p>Every policy on its own terms, no grouping
        approximation. Exact where averaging used to blur it — the outliers and the unusual risks.</p></div>
      <div class="gain"><b>Faster, no ceiling</b><p>The full book across a cluster; runtime is a
        sizing choice, not a wall. More frequent runs, faster close, what-if on demand.</p></div>
      <div class="gain"><b>One platform, one lineage</b><p>Data, assumptions, scenarios, projection
        and results in one place, fully reproducible — "prove what fed this number" answered end
        to end.</p></div>
      <div class="gain"><b>Open, not opaque</b><p>The model is Python you can read, inspect per
        policy and debug. No black box, and no single specialist tool to depend on.</p></div>
    </div>

    <div class="scopenote">Honestly: deterministic seriatim is reachable now; the hardest
    stochastic content is the last mile.</div>`);
    return;
  }

  const block = (tile, title, text, primary, cls) => tile.flow
    ? `<a class="pblock ${cls||''}${primary?' primary':''}" href="#/flow/${tile.flow}"><h3>${esc(title)}</h3>
       <p>${esc(text)}</p><div class="go">Open the demo →</div></a>`
    : `<a class="pblock ${cls||''}" href="${tile.url}" target="_blank"><h3>${esc(title)}</h3>
       <p>${esc(text)}</p><div class="go">Open the assets ↗</div></a>`;
  shell('map', `
  <div class="eyebrow">Bricksurance Life · presenter's cockpit</div>
  <h1>Actuarial liability modelling, end to end</h1>
  ${pills}
  <p class="sub" style="margin-top:14px">The whole process, left to right: everything that feeds the actuarial engine,
  the engine itself — downstream of us and unchanged — and everything that comes out of it.
  Click a block to open that part of the demo.</p>

  <div class="pmap">
    <div class="pcol"><div class="collbl">Inputs — what feeds the engine</div>
      <a class="pblock c-blue primary" href="#/flow/model-point-feed"><h3>Policy data → model point file<span class="ntag live">live</span></h3>
       <p>Raw policy records grouped into the summarised file the engine reads — gated, reconciled, lineage end to end.</p>
       <div class="go">Open the beat →</div></a>
      <a class="pblock c-blue" href="#/block/assumptions"><h3>Assumptions — the basis<span class="ntag next">next</span></h3>
       <p>Mortality, lapse and expense tables: versioned, approved, audit-trailed. Excel entry kept.</p>
       <div class="go">Open the block →</div></a>
      ${block(t[3], 'Economic scenarios', 'Your scenario provider\'s sets, versioned and gated — plus an illustrative generated set.')}
    </div>
    <div class="pmaparr">→</div>
    <div class="pcol"><div class="collbl">The engine</div>
      <div class="engineblk"><span class="tag">Downstream — unchanged</span>
        <h3>Actuarial engine</h3>
        <p>Your licensed modelling engine. It reads the same files it reads today.
        Nothing we build moves it — that's the no-risk transition.</p></div>
      <div class="beside"><div class="collbl">Beside the engine — the migration path</div>
        <a href="#/block/modelling"><b>Modelling — the content move<span class="ntag planned">planned</span></b>
          <span>The engine's own calculation in Python, tied out per model point — trust earned
          run by run. Stochastic fan-out for the runs the overnight window can't fit.</span></a>
        <p style="font-size:11.5px;color:var(--muted);margin-top:8px">Product by product, at your
        pace. Whether a tied-out product ever moves is your decision — the engine keeps running
        either way. <a href="#/destination">Where does it land? →</a></p></div>
    </div>
    <div class="pmaparr">→</div>
    <div class="pcol"><div class="collbl">Outputs & analytics</div>
      <a class="pblock c-green" href="#/block/results"><h3>Results & analytics<span class="ntag planned">planned</span></h3>
       <p>Engine output lands in Delta once; the BEL dashboard and Genie answer in English. The export is always offered.</p>
       <div class="go">Open the block →</div></a>
      <a class="pblock c-green" href="#/governance"><h3>Governance & audit</h3>
        <p>Every run, every basis, every sign-off — on the record. The regulator's question is a query.</p>
        <div class="go">Open the record →</div></a>
    </div>
  </div>`);
}

function personasPage(){
  const personas = `<div class="grid g2">`+DATA.personas.map(p=>
    `<div class="card persona" onclick="location.hash='#/p/${p.id}'">
       <div class="eyebrow">Persona</div><h2>${esc(p.title)}</h2><p>${esc(p.blurb)}</p>
       <div class="go">${p.cards.length} questions →</div></div>`).join('')+`</div>`;
  shell('personas', `
  <div class="eyebrow">Presenting to someone specific?</div>
  <h1>Pick the seat across the table</h1>
  <p class="sub">Each persona has the questions that seat actually asks — and each card says what
  it proves, where it lives, and where to click.</p>
  ${personas}`);
}

async function loadGov(){
  if(!GOV){ try{ GOV = await (await fetch('api/governance')).json(); }catch(e){ GOV={runs:[]}; } }
  return GOV;
}

async function filePage(key){
  shell('mp', `<div class="crumb"><a href="#/">Process map</a> /
    <a href="#/flow/model-point-feed">Model points</a> / file</div>
    <p class="sub" style="margin-top:14px">Reading the file…</p>`);
  let d; try{ d = await (await fetch('api/file/'+encodeURIComponent(key))).json(); }
  catch(e){ d={error:'Could not load the preview.'}; }
  if(location.hash !== '#/file/'+key) return;
  if(d.error){
    shell('mp', `<div class="crumb"><a href="#/">Process map</a> / file</div>
      <p class="sub" style="margin-top:14px">${esc(d.error)}</p>`);
    return;
  }
  const switcher = d.keys.map(k=>
    `<a class="plink" style="${k.key===key?'border-color:var(--v);color:var(--v)':''}" href="#/file/${k.key}">${esc(k.title)}</a>`).join('');
  const table = `<div style="overflow-x:auto;margin-top:12px"><table class="gtable">
    <tr>${d.columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr>
    ${d.rows.map(r=>`<tr>${r.map(v=>`<td style="font-variant-numeric:tabular-nums">${esc(v)}</td>`).join('')}</tr>`).join('')}
    </table></div>`;
  shell('mp', `
  <div class="crumb"><a href="#/">Process map</a> / <a href="#/flow/model-point-feed">Model points</a> / file</div>
  <div class="eyebrow">Read-only preview · step 4</div>
  <h1 class="flow-h2">${esc(d.title)}</h1>
  <p class="story">${esc(d.note)}</p>
  <div class="chips" style="margin-top:10px">
    <span class="chip"><b>${esc(d.name)}</b></span>
    <span class="chip">written ${esc(d.modified)}</span>
    <span class="chip">${esc(String(d.size_kb))} KB</span>
    <span class="chip">showing first ${d.rows.length} rows</span></div>
  <div class="plinks" style="margin-top:12px">${switcher}
    <a class="plink" href="${d.volume_url}" target="_blank">Open on the volume (download / Excel) ↗</a></div>
  ${table}
  <div class="foot">Display only — the cockpit never edits an artifact. The file itself lives on the
  governed volume; lineage links it back to every policy row that produced it.</div>`);
}

function flowPage(fid, tab){
  const f = DATA.flows.find(x=>x.id===fid); if(!f) return landing();
  tab = tab || 'process';
  loadGov().then(g=>{
    const r=(g.runs||[])[0]; if(!r) return;
    const el=document.getElementById('flowchips'); if(!el) return;
    el.innerHTML = [
      `Valuation date: <b>${esc(r.valuation_date||'—')}</b>`,
      `Last run: <b style="color:${r.verdict==='GREEN'?'var(--green)':'#b42318'}">${esc(r.verdict)}</b>`,
      r.policies_in_scope?`<b>${Number(r.policies_in_scope).toLocaleString()}</b> policies → <b>${Number(r.model_points).toLocaleString()}</b> model points`:null,
      r.movement_check && r.movement_check!=='—' ? `movement: <b>${esc(r.movement_check)}</b>` : null,
    ].filter(Boolean).map(x=>`<span class="chip">${x}</span>`).join('');
  });

  const tabs = [['process',"What we're showing"],['oldnew','Old → new'],['manage','Management']];
  const subnav = `<div class="subtabs">${tabs.map(([k,l])=>
    `<a class="subtab ${tab===k?'on':''}" href="#/flow/${f.id}/${k}">${esc(l)}</a>`).join('')}</div>`;

  let body='';
  if(tab==='process'){
    body = `<p class="lead">${esc(f.tab1.lead)}</p>
    <div class="usefor">${esc(f.use_for)}</div>
    <div class="mapgrid" style="margin-top:18px">${f.skeleton.map((st,i)=>
      `<div class="step"><div class="num">${i+1}</div><h3>${esc(st.title)}</h3>
         <p>${esc(st.plain)}</p></div>`).join('')}</div>
    <div class="maparrows" style="margin-top:6px">${f.skeleton.map((_,i)=>
      `<div>${i<f.skeleton.length-1?'':''}</div>`).join('')}</div>`;
  }
  if(tab==='oldnew'){
    body = `<p class="lead">${esc(f.tab2.lead)}</p>` +
    f.tab2.swaps.map((sw,i)=>`<div class="swaprow">
      <div class="sn">${i+1}</div>
      <div class="swapold"><span class="sl">${esc(f.skeleton[i].title)} · old</span>${esc(sw.old)}</div>
      <div class="arr">→</div>
      <div class="swapnew"><span class="sl">${esc(f.skeleton[i].title)} · new</span>${esc(sw.new)}<div>
        ${sw.links.map(x=>`<a class="lnk" href="${x.url}" target="_blank">${esc(x.label)} ↗</a>`).join('')}
        ${sw.peek?`<a class="lnk" href="${sw.peek.hash}">${esc(sw.peek.label)} →</a>`:''}</div></div>
    </div>`).join('') +
    `<div class="handoff">
      <div class="ours"><span class="sl">Our scope ends here</span>${esc(f.tab2.handoff.ours)}</div>
      <div class="boundary"><span>scope boundary</span></div>
      <div class="theirs"><span class="sl">Downstream — unchanged</span>${esc(f.tab2.handoff.theirs)}</div>
    </div>
    <div class="handoffnote">${esc(f.tab2.handoff.text)}</div>
    <a class="nextlink" href="${f.tab2.handoff.next_url}" target="_blank">${esc(f.tab2.handoff.next_label)} →</a>
    <div class="scopenote">${esc(f.tab2.scope)}</div>`;
  }
  if(tab==='manage'){
    body = `<p class="lead">${esc(f.tab3.lead)}</p>
    <div class="mgrid">
      <div class="mcard"><h3>Run control</h3><div id="runctl">Loading…</div>
        <div class="mbtns">
          <button class="btn2" onclick="triggerRun('run',this)">Run now</button>
          <button class="btn2" onclick="triggerRun('inject',this)">Inject bad feed</button>
          <button class="btn2" onclick="triggerRun('restore',this)">Restore</button></div>
        <div class="mline" id="trigmsg" style="color:var(--muted)"></div>
        <div class="mline" style="color:var(--muted);font-size:12px">${esc(f.tab3.run_help)}</div></div>
      <div class="mcard"><h3>Issues</h3><div id="issues">Loading…</div></div>
      <div class="mcard"><h3>The overseer</h3>
        <div class="mline" style="color:var(--muted)">${esc(f.tab3.agent.intro)}
          <a href="${f.tab3.agent.genie_url}" target="_blank">Open ${esc(f.tab3.agent.genie_title)} ↗</a></div>
        <div class="askbox"><textarea id="askq" placeholder="Ask about the latest run…"></textarea>
          <div class="mbtns"><button class="btn2" onclick="askOverseer()">Ask</button></div>
          ${f.tab3.agent.questions.map(q=>`<span class="askq" onclick="document.getElementById('askq').value=this.textContent;askOverseer()">${esc(q)}</span>`).join('')}
          <div id="askans"></div></div></div>
    </div>
    <details class="beat"><summary>Run this beat — the 10-minute click path</summary>
      <div class="b-steps">${f.beat.map((b,i)=>
        `<div class="b-step"><div class="bn">${i+1}</div><div>
           <div class="bdo">${esc(b.do)}</div>
           <div class="bex">Expect: ${esc(b.expect)}</div>
           <div class="bsay">${esc(b.say)}</div></div></div>`).join('')}</div></details>`;
    setTimeout(loadRunControl, 0);
  }

  shell('mp', `
  <div class="crumb"><a href="#/">Overview</a> / ${esc(f.eyebrow)}</div>
  <div class="eyebrow">${esc(f.eyebrow)}</div>
  <h1 class="flow-h2">${esc(f.title)}</h1>
  <div class="chips" id="flowchips" style="margin-top:10px"></div>
  ${subnav}
  ${body}
  <div class="foot">Every link opens the real Databricks asset — the cockpit annotates, it never simulates.
  New to the terminology? <a href="#/terms">Eight terms, one line each</a>.</div>`);
}

async function loadRunControl(){
  let d; try{ d = await (await fetch('api/runcontrol')).json(); }catch(e){ d={}; }
  const rc=document.getElementById('runctl');
  if(rc){
    if(d.job){
      const l=d.job.last;
      rc.innerHTML = `<div class="mline">Job: <a href="${d.job.url}" target="_blank">${esc(d.job.name)} ↗</a></div>
        <div class="mline">${esc(d.job.schedule)}</div>` +
        (l?`<div class="mline">Last run: <b class="${esc(l.state)}">${esc(l.state)}</b> · ${esc(l.when)} ·
            <a href="${l.url}" target="_blank">open ↗</a></div>`:'');
    } else rc.innerHTML = '<div class="mline" style="color:var(--muted)">Run status unavailable.</div>';
  }
  const is=document.getElementById('issues');
  if(is){
    if(d.gate){
      let rules={}; try{ rules=JSON.parse(d.gate.rules||'{}'); }catch(e){}
      const entries=Object.entries(rules).sort((a,b)=>b[1]-a[1]);
      const max=Math.max(...entries.map(e=>e[1]),1);
      is.innerHTML = `<div class="mline">Latest gate: <b class="${esc(d.gate.verdict)}">${esc(d.gate.verdict)}</b> · ${esc(d.gate.when)}</div>
        <div class="mline">In quarantine: <b>${Number(d.gate.quarantined).toLocaleString()}</b> rows ·
          movement ${esc(d.gate.movement||'—')} · grouping ${esc(d.gate.grouping||'—')}</div>` +
        (entries.length?entries.map(([k,v])=>`<div class="rulebar"><span class="rname" style="flex-basis:150px">${esc(k)}</span>
           <span class="bar" style="width:${Math.round(120*v/max)}px"></span>
           <span class="cnt">${Number(v).toLocaleString()}</span></div>`).join(''):
          '<div class="mline" style="color:var(--muted)">Nothing in quarantine — the book is clean.</div>') +
        `<div class="mline" style="color:var(--muted);font-size:12px">${d.gate.verdict==='RED'
          ?'What to do: review the quarantine reasons, fix or restore the feed, rerun — the file was never touched.'
          :'What to do: nothing. The gate signed off and the file is released.'}</div>`;
    } else is.innerHTML = '<div class="mline" style="color:var(--muted)">No gate record yet — run the overnight job.</div>';
  }
}

async function triggerRun(action, btn){
  const labels={run:'the overnight run',inject:'the bad feed injection',restore:'the restore'};
  if(!confirm(`Start ${labels[action]}?`)) return;
  const msg=document.getElementById('trigmsg');
  msg.textContent='Starting…';
  try{
    const r = await (await fetch('api/run/trigger',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({action})})).json();
    msg.innerHTML = r.ok ? `Started — <a href="${r.url}" target="_blank">watch the run ↗</a>` : esc(r.error||'Failed.');
  }catch(e){ msg.textContent='Failed to start.'; }
}

async function askOverseer(){
  const q=document.getElementById('askq').value.trim(); if(!q) return;
  const out=document.getElementById('askans');
  out.innerHTML='<div class="askans">The overseer is reading the run record…</div>';
  try{
    const r = await (await fetch('api/ask',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})})).json();
    if(r.error){ out.innerHTML=`<div class="askans">${esc(r.error)}</div>`; return; }
    let html = r.texts.map(t=>`<p style="margin-bottom:6px">${esc(t)}</p>`).join('');
    if(r.table){
      html += `<div style="overflow-x:auto"><table class="gtable" style="margin-top:6px">
        <tr>${r.table.columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr>
        ${r.table.rows.map(row=>`<tr>${row.map(v=>`<td>${esc(v)}</td>`).join('')}</tr>`).join('')}</table></div>`;
    }
    if(r.sql) html += `<details style="margin-top:6px"><summary style="font-size:11px;color:var(--muted);cursor:pointer">the SQL it ran</summary><pre>${esc(r.sql)}</pre></details>`;
    out.innerHTML = `<div class="askans">${html||'No answer.'}</div>`;
  }catch(e){ out.innerHTML='<div class="askans">Could not reach the overseer.</div>'; }
}

async function governancePage(){
  if(!GOV){
    shell('gov', `<div class="eyebrow">Governance</div><h1 class="flow-h2">The record</h1>
      <p class="sub" style="margin-top:10px">Loading the run record…</p>`);
    try{ GOV = await (await fetch('api/governance')).json(); }catch(e){ GOV={runs:[],inventory:[],error:'Could not load.'}; }
    if(location.hash.includes('governance')) governancePage();
    return;
  }
  const g = GOV;

  // 1 · run history
  let runsHtml;
  if(g.error){ runsHtml = `<p class="sub" style="margin-top:10px">${esc(g.error)}</p>`; }
  else if(!g.runs.length){ runsHtml = `<p class="sub" style="margin-top:10px">No runs on record yet — run the overnight job.</p>`; }
  else{
    runsHtml = `<table class="gtable"><tr><th>Run</th><th>Verdict</th><th class="num">Landed</th>
      <th class="num">Quarantined</th><th class="num">Policies → MPs</th><th>Movement</th><th>Grouping</th>
      <th>Basis in force <span style="text-transform:none;font-weight:600">(approved mortality/lapse/expense set)</span></th><th>Signed off by</th></tr>` +
      g.runs.map(r=>`<tr>
        <td>${esc(r.run)}</td>
        <td><span class="badge ${esc(r.verdict)}">${esc(r.verdict)}</span></td>
        <td class="num">${Number(r.rows_bronze).toLocaleString()}</td>
        <td class="num">${Number(r.rows_quarantined).toLocaleString()} (${esc(r.quarantine_pct)}%)</td>
        <td class="num">${r.policies_in_scope?Number(r.policies_in_scope).toLocaleString()+' → '+Number(r.model_points).toLocaleString():'—'}</td>
        <td>${r.movement_check && r.movement_check!=='—' ? `<span class="badge ${r.movement_check==='PASS'?'GREEN':(r.movement_check==='BREACH'?'RED':'')}">${esc(r.movement_check)}</span>${r.movement_policies_pct!=null?` <span style="color:var(--muted);font-size:11px">Δpol ${esc(r.movement_policies_pct)}% · ΔSA ${esc(r.movement_sa_pct)}%</span>`:''}` : '—'}</td>
        <td>${r.grouping_check && r.grouping_check!=='—' ? `<span class="badge ${r.grouping_check==='PASS'?'GREEN':'RED'}">${esc(r.grouping_check)}</span>`:'—'}</td>
        <td style="font-family:ui-monospace,monospace;font-size:11.5px">${esc(r.assumption_set_id||'—')}</td>
        <td>${esc(r.signed_off_by)}</td></tr>`).join('') + `</table>` +
      `<p class="sub" style="margin-top:8px;font-size:12.5px">A RED run carries no sign-off — that's the
      control working, not a gap. Movement reconciles policy count and sum assured against the last
      good run; Grouping proves control totals survive the policies→model-points compression.</p>`;
  }

  // 2 · why it went RED — latest run with rejects
  let rulesHtml = `<p class="sub" style="margin-top:10px">No rejects on the current record — inject the bad feed to see this populate.</p>`;
  const withRejects = (g.runs||[]).find(r=>Number(r.rows_quarantined)>0 && r.rule_breakdown);
  if(withRejects){
    let rules={}; try{ rules=JSON.parse(withRejects.rule_breakdown); }catch(e){}
    const entries=Object.entries(rules).sort((a,b)=>b[1]-a[1]);
    const max=Math.max(...entries.map(e=>e[1]),1);
    rulesHtml = `<p class="sub" style="margin:10px 0 4px">Run of ${esc(withRejects.run)} —
      ${Number(withRejects.rows_quarantined).toLocaleString()} rows rejected, by rule:</p>` +
      entries.map(([k,v])=>`<div class="rulebar"><span class="rname">${esc(k)}</span>
        <span class="bar" style="width:${Math.round(260*v/max)}px"></span>
        <span class="cnt">${Number(v).toLocaleString()}</span></div>`).join('');
  }

  // 3 · what we record and why
  const inv = `<table class="gtable"><tr><th>What's recorded</th><th>Where</th><th>Why it matters</th></tr>` +
    g.inventory.map(i=>`<tr><td style="font-weight:600">${esc(i.what)}</td>
      <td><a href="${i.where.url}" target="_blank" style="font-family:ui-monospace,monospace;font-size:11.5px">${esc(i.where.label)} ↗</a></td>
      <td style="color:var(--muted)">${esc(i.why)}</td></tr>`).join('') + `</table>`;

  shell('gov', `
  <div class="crumb"><a href="#/governance">Governance</a> / sign-off gates</div>
  <div class="eyebrow">Governance · sign-off gates<span class="ntag live">live</span></div>
  <h1 class="flow-h2">The record</h1>
  <p class="story">Nothing on this page was written for audit — it's the by-product of running the
  process. Three questions an auditor or a head of function asks, answered straight from the tables.</p>

  <div class="section" style="margin-top:22px"><span class="eyebrow">1 · What ran, and was it clean?</span></div>
  ${runsHtml}

  <div class="section" style="margin-top:26px"><span class="eyebrow">2 · When it went RED — why, exactly?</span></div>
  ${rulesHtml}

  <div class="section" style="margin-top:26px"><span class="eyebrow">3 · What we record, and why</span></div>
  ${inv}

  <div class="scopenote">${esc(g.scope)}</div>
  <div class="foot">Read-only, pulled live from <b>${esc(DATA?DATA.catalog:'')}.lifecast</b> —
  the same tables an auditor would query directly.</div>`);
}

function termsPage(){
  shell('terms', `
  <div class="crumb"><a href="#/">Overview</a> / terms</div>
  <div class="eyebrow">Before you present</div>
  <h1 class="flow-h2">Eight terms, one line each</h1>
  <p class="story">Enough to survive the first follow-up question. The full learn-this-process
  module is coming; until then, these are the words that matter.</p>
  ${DATA.terms.map(t=>`<div class="termrow"><b>${esc(t.term)}</b><span>${esc(t.text)}</span></div>`).join('')}
  <div class="foot">Client-safe — nothing here you couldn't say with the prospect in the room.</div>`);
}

function personaPage(pid){
  const p = DATA.personas.find(x=>x.id===pid); if(!p) return landing();
  const items = p.cards.map(c=>
    `<div class="card qitem" onclick="location.hash='#/p/${p.id}/${c.id}'">
       <h2>${esc(c.question)}</h2><span class="arr">→</span></div>`).join('');
  shell('personas', `<div class="crumb"><a href="#/personas">Personas</a> / ${esc(p.title)}</div>
    <div class="eyebrow">Persona</div><h1>${esc(p.title)}</h1>
    <p class="sub">${esc(p.blurb)}</p>
    <div class="grid">${items}</div>`);
}

function cardPage(pid, cid){
  const p = DATA.personas.find(x=>x.id===pid); if(!p) return landing();
  const c = p.cards.find(x=>x.id===cid); if(!c) return personaPage(pid);
  shell('personas', `<div class="crumb"><a href="#/personas">Personas</a> / <a href="#/p/${p.id}">${esc(p.title)}</a> / card</div>
  <div class="card" style="margin-top:20px">
    <h2>“${esc(c.question)}”</h2>
    <div class="section"><span class="eyebrow">Proves</span><div class="proves">${esc(c.proves)}</div></div>
    <div class="section"><span class="eyebrow">Where it lives</span>
      <ul class="where body">${c.where.map(x=>`<li><a href="${x.url}" target="_blank">${esc(x.label)} ↗</a></li>`).join('')}</ul></div>
    <div class="section"><span class="eyebrow">Build &amp; control</span><div class="body">${esc(c.build)}</div></div>
    <div class="section"><span class="eyebrow">Go</span>
      <div class="gobtns">${c.links.map(x=>`<a class="btn" href="${x.url}" target="_blank">${esc(x.label)} ↗</a>`).join('')}</div></div>
    <div class="section"><span class="eyebrow">Today → tomorrow</span>
      <div class="tt"><div class="t today"><span class="tag">Today</span>${esc(c.today)}</div>
      <div class="t tomorrow"><span class="tag">Tomorrow</span>${esc(c.tomorrow)}</div></div></div>
  </div>`);
}

function blockPage(key){
  if(key==='roadmap'){
    const r = DATA.roadmap;
    shell('roadmap', `
    <div class="crumb"><a href="#/">Overview</a> / roadmap</div>
    <div class="eyebrow">Wider solution<span class="ntag roadmap">roadmap</span></div>
    <h1 class="flow-h2">${esc(r.title)}</h1>
    <p class="lead">${esc(r.will_show)}</p>
    ${r.groups.map(([g,items])=>`
      <div class="section" style="margin-top:20px"><span class="eyebrow">${esc(g)}</span></div>
      <div class="phgrid">${items.map(i=>`<div class="phcard"><p>${esc(i)}</p>
        <span class="ntag roadmap" style="margin-left:0;margin-top:6px;display:inline-block">connects here · roadmap</span></div>`).join('')}</div>`).join('')}
    <div class="foot">Every connection point is stated, not simulated — it gets built when the
    conversation asks for it.</div>`);
    return;
  }
  const b = DATA.blocks[key]; if(!b) return landing();
  shell(key, `
  <div class="crumb"><a href="#/">Overview</a> / ${esc(b.title)}</div>
  <div class="eyebrow">${esc(b.section)}<span class="ntag ${esc(b.state)}">${esc(b.state)} · placeholder</span></div>
  <h1 class="flow-h2">${esc(b.title)}</h1>
  <p class="lead">${esc(b.will_show)}</p>
  <div class="section" style="margin-top:20px"><span class="eyebrow">The beat, when it lands — same three tabs</span></div>
  <div class="phgrid">
    ${b.tabs.map((t,i)=>`<div class="phcard"><span class="tlbl">${i+1} · ${esc(t[0])}</span>
      <p>${esc(t[1])}</p></div>`).join('')}
  </div>
  <div class="scopenote">${esc(b.posture)}</div>
  ${b.agents.length?`<div class="section" style="margin-top:18px"><span class="eyebrow">Agents — in this beat's management tab</span></div>`+
    b.agents.map(a=>`<div class="agentrow">${esc(a[0])}<span class="ntag ${esc(a[1])}" style="margin-left:auto">${esc(a[1])}</span></div>`).join(''):''}
  <div class="section" style="margin-top:18px"><span class="eyebrow">Already live underneath</span>
    <div class="body">${b.assets.map(a=>`<a href="${a.url}" target="_blank" style="display:block;margin-top:5px;font-weight:600;font-size:13px">${esc(a.label)} ↗</a>`).join('')}</div></div>
  <div class="foot">An openly-marked placeholder — it states intent, it never fake-works. The
  workspace assets behind it are real and running today.</div>`);
}

function governanceShowcase(){
  shell('gov', `
  <div class="crumb"><a href="#/">Overview</a> / governance</div>
  <div class="eyebrow">Cross-cutting<span class="ntag coming">mostly placeholder</span></div>
  <h1 class="flow-h2">Governance — the one-place view</h1>
  <p class="lead">The lead seller, aggregated. Each piece also appears inside its beat's management
  tab — this block is where it all rolls up.</p>
  <div class="phgrid" style="margin-top:18px">
    ${DATA.gov_showcase.map(c=> c.state==='live'
      ? `<a class="pblock c-green" href="${c.route}"><h3>${esc(c.title)}<span class="ntag live">live</span></h3>
         <p>${esc(c.text)}</p><div class="go">Open the record →</div></a>`
      : `<div class="phcard"><span class="tlbl">${esc(c.title)}</span><p>${esc(c.text)}</p>
         <span class="ntag coming" style="margin-left:0;margin-top:6px;display:inline-block">coming</span></div>`).join('')}
  </div>
  <div class="section" style="margin-top:18px"><span class="eyebrow">Agent — in this block</span></div>
  <div class="agentrow">${esc(DATA.gov_agent[0])}<span class="ntag placeholder" style="margin-left:auto">${esc(DATA.gov_agent[1])}</span></div>
  <div class="foot">Live pieces open the real record; stubs state intent and never fake-work.</div>`);
}

function pocPage(){
  const p = DATA.poc;
  shell('poc', `
  <div class="crumb"><a href="#/">Overview</a> / POC plan</div>
  <div class="eyebrow">Brief §12.3 · narrowed to one product</div>
  <h1 class="flow-h2">${esc(p.title)}</h1>
  <p class="lead">${esc(p.lead)}</p>
  <div class="section" style="margin-top:22px"><span class="eyebrow">Objective</span>
    <div class="body" style="max-width:780px">${esc(p.objective)}</div></div>
  <div class="scopenote">${esc(p.scope_out)}</div>
  <div class="section" style="margin-top:24px"><span class="eyebrow">Reused vs swapped</span></div>
  <table class="gtable"><tr><th>The scaffold — reused as-is</th><th>Yours — swapped in</th></tr>
    ${p.reuse.map(([a,b])=>`<tr><td>${esc(a)}</td><td style="font-weight:600">${esc(b)}</td></tr>`).join('')}</table>
  <div class="section" style="margin-top:24px"><span class="eyebrow">Week by week</span></div>
  ${p.weeks.map((w,i)=>`<div class="b-step" style="background:var(--card);border:1px solid var(--line);
     border-radius:12px;padding:12px 16px;margin-top:10px;border-top:1px solid var(--line)">
     <div class="bn">${i+1}</div><div><div class="bdo">${esc(w[0])}</div>
     <div class="bex" style="margin-top:3px">${esc(w[1])}</div></div></div>`).join('')}
  <div class="section" style="margin-top:24px"><span class="eyebrow">Exit criteria — measurable, agreed in week 1</span></div>
  <table class="gtable"><tr><th style="width:30px">#</th><th>Criterion</th><th>Target</th></tr>
    ${p.exit.map(([c,t],i)=>`<tr><td>${i+1}</td><td style="font-weight:600">${esc(c)}</td><td>${esc(t)}</td></tr>`).join('')}</table>
  <div class="section" style="margin-top:24px"><span class="eyebrow">The decision at exit</span>
    <div class="body" style="max-width:780px">${esc(p.decision)}</div></div>
  <div class="section" style="margin-top:20px"><span class="eyebrow">What we need from you</span>
    <ul class="where body">${p.needs.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>
  <div class="foot">The evidence pack is a by-product of running — tie-out records, run history with
  basis and code version, gate history, approval trails, lineage. Nothing is assembled by hand.
  Ships with the repo as POC_TERM_PRODUCT.md.</div>`);
}

function route(){
  if(!DATA) return;
  const h = location.hash.replace(/^#\/?/,'');
  const parts = h.split('/').filter(Boolean);
  if(parts[0]==='destination') return landing('dest');
  if(parts[0]==='poc') return pocPage();
  if(parts[0]==='personas') return personasPage();
  if(parts[0]==='terms') return termsPage();
  if(parts[0]==='file' && parts[1]) return filePage(parts[1]);
  if(parts[0]==='governance' && parts[1]==='record') return governancePage();
  if(parts[0]==='governance') return governanceShowcase();
  if(parts[0]==='block' && parts[1]) return blockPage(parts[1]);
  if(parts[0]==='flow' && parts[1]) return flowPage(parts[1], parts[2]);
  if(parts[0]==='p' && parts[2]) return cardPage(parts[1], parts[2]);
  if(parts[0]==='p' && parts[1]) return personaPage(parts[1]);
  landing();
}
window.addEventListener('hashchange', route);

(async()=>{
  DATA = await (await fetch('api/content')).json();
  route();
})();
</script>
</body>
</html>
